name: Crashlytics Claude Fix

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pull-requests: write

jobs:
  crashlytics-claude-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: crashlytics-claude-fix
      cancel-in-progress: false
    env:
      FIREBASE_PROJECT: ${{ secrets.GCP_PROJECT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          create_credentials_file: true

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Fetch latest Crashlytics crashes from BigQuery
        id: fetch_crashes
        shell: bash
        env:
          BQ_CRASH_TABLE: ${{ secrets.BQ_CRASH_TABLE }}
        run: |
          mkdir -p .tmp
          TABLE="${BQ_CRASH_TABLE:-${FIREBASE_PROJECT}.firebase_crashlytics.com_example_AgentUsersApp_ANDROID}"
          echo "Querying BigQuery table: $TABLE"

          BQ_RESULT=$(bq query \
            --project_id="${FIREBASE_PROJECT}" \
            --use_legacy_sql=false \
            --format=json \
            "SELECT *
            FROM \`${TABLE}\`
            ORDER BY event_timestamp DESC
            LIMIT 10" 2>&1)

          BQ_EXIT=$?
          echo "BigQuery exit code: $BQ_EXIT"

          if [ $BQ_EXIT -eq 0 ] && echo "$BQ_RESULT" | python3 -c "import json,sys; d=json.load(sys.stdin); assert len(d)>0" 2>/dev/null; then
            echo "$BQ_RESULT" > .tmp/crashes.json
            echo "has_crashes=true" >> "$GITHUB_OUTPUT"
            echo "Found $(echo "$BQ_RESULT" | python3 -c "import json,sys; print(len(json.load(sys.stdin)))" 2>/dev/null) crash events"
          else
            echo "No crash data found or BigQuery query failed"
            echo "$BQ_RESULT"
            echo "has_crashes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Claude prompt with crash data
        if: steps.fetch_crashes.outputs.has_crashes == 'true'
        shell: bash
        run: |
          cat > .tmp/claude-prompt.md <<'PROMPT_START'
          You have crash data from Firebase Crashlytics below. Your task:

          1. Analyze the crash data to identify the most recent actionable crash
          2. Read the relevant Kotlin/Android source files based on the stack trace
          3. Apply the smallest safe fix that addresses the crash
          4. Verify by running: ./gradlew :app:compileDebugKotlin

          Fix guidelines:
          - Prefer null-safety guards, bounds checks, lifecycle safety, and defensive parsing
          - Preserve existing architecture, MVVM structure, and design patterns
          - Do NOT modify secrets, workflow files, google-services.json, or Firebase config
          - Do NOT run git commit or git push
          - If no safe fix is possible, make no changes

          Output: Start your final message with `PR title: <specific title>` then summarize.

          Crash data:
          ```json
          PROMPT_START
          cat .tmp/crashes.json >> .tmp/claude-prompt.md
          cat >> .tmp/claude-prompt.md <<'PROMPT_END'
          ```
          PROMPT_END

      - name: Run Claude Code
        if: steps.fetch_crashes.outputs.has_crashes == 'true'
        id: claude
        uses: anthropics/claude-code-base-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt_file: .tmp/claude-prompt.md
          allowed_tools: "Read,Edit,Write,Glob,Grep,Bash(./gradlew:*),Bash(find:*),Bash(ls:*)"
          max_turns: "30"
          model: "claude-sonnet-4-20250514"

      - name: Prepare pull request metadata
        if: steps.fetch_crashes.outputs.has_crashes == 'true'
        id: pr_meta
        shell: bash
        run: |
          PR_TITLE="fix: automated Crashlytics crash fix"
          PR_BODY=""
          EXEC_FILE="${{ steps.claude.outputs.execution_file }}"
          if [ -f "$EXEC_FILE" ]; then
            python3 -c "
          import json, sys
          data = json.load(open(sys.argv[1]))
          msgs = data.get('messages', data if isinstance(data, list) else [])
          title = ''
          body = ''
          for msg in reversed(msgs):
              if isinstance(msg, dict) and msg.get('role') == 'assistant':
                  content = msg.get('content', '')
                  if isinstance(content, str):
                      text = content
                  elif isinstance(content, list):
                      text = next((b['text'] for b in content if isinstance(b, dict) and b.get('type') == 'text'), '')
                  else:
                      continue
                  lines = text.splitlines()
                  for i, line in enumerate(lines):
                      if line.strip().startswith('PR title:'):
                          title = line.strip().split('PR title:', 1)[1].strip()
                          body = '\n'.join(lines[i+1:]).strip()
                          break
                  if title:
                      break
          with open('.tmp/pr_title.txt', 'w') as f:
              f.write(title)
          with open('.tmp/pr_body.txt', 'w') as f:
              f.write(body)
          " "$EXEC_FILE" 2>/dev/null || true
            if [ -s .tmp/pr_title.txt ]; then
              CANDIDATE="$(cat .tmp/pr_title.txt)"
              if [ -n "$CANDIDATE" ]; then
                PR_TITLE="$CANDIDATE"
              fi
            fi
            if [ -s .tmp/pr_body.txt ]; then
              PR_BODY="$(cat .tmp/pr_body.txt)"
            fi
          fi
          echo "title=$PR_TITLE" >> "$GITHUB_OUTPUT"
          {
            echo "body<<PREOF"
            echo "$PR_BODY"
            echo "PREOF"
          } >> "$GITHUB_OUTPUT"

      - name: Print git status
        run: git status --short

      - name: Print git diff
        run: git diff --stat && git diff

      - name: Clean temporary artifacts before change detection
        shell: bash
        run: |
          rm -rf .tmp/
          rm -f .firebaserc
          rm -f gha-creds-*.json
          rm -f output.txt
          rm -rf .claude/
          git checkout -- .codex/config.toml 2>/dev/null || true

      - name: Detect code changes
        id: changes
        shell: bash
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No safe code changes were produced. No PR will be opened."
          fi

      - name: Write google-services.json
        if: steps.changes.outputs.has_changes == 'true'
        shell: bash
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Compile Android project
        if: steps.changes.outputs.has_changes == 'true'
        run: ./gradlew clean :app:compileDebugKotlin --no-build-cache

      - name: Create draft pull request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GH_PAT }}
          branch-token: ${{ secrets.GH_PAT }}
          branch: automation/crashlytics-claude-fix-${{ github.run_id }}-${{ github.run_attempt }}
          delete-branch: true
          commit-message: ${{ steps.pr_meta.outputs.title }}
          title: ${{ steps.pr_meta.outputs.title }}
          body: |
            ## Claude Code Analysis

            ${{ steps.pr_meta.outputs.body }}

            ## Verification
            - Compiled with `./gradlew clean :app:compileDebugKotlin --no-build-cache`

            ## Safety
            - This PR was created automatically as a **draft**
            - No auto-merge is configured
          draft: true
