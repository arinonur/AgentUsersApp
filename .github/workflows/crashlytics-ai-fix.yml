name: Crashlytics AI Fix

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  crashlytics-ai-fix:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          create_credentials_file: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Python dependencies
        run: python -m pip install --upgrade google-cloud-bigquery

      - name: Fetch recent Crashlytics incident
        id: fetch_crash
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          mkdir -p .tmp
          python scripts/fetch_crashlytics_incidents.py

          if [ -f .tmp/crash_packet.json ]; then
            echo "packet_found=true" >> "$GITHUB_OUTPUT"
          else
            echo "packet_found=false" >> "$GITHUB_OUTPUT"
            echo "No recent Crashlytics crash packet found. Exiting successfully."
          fi

      - name: Run Codex on crash packet
        if: steps.fetch_crash.outputs.packet_found == 'true'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/prompts/crash_fix_prompt.md
          working-directory: .
          output-file: .tmp/codex-final-message.txt
          sandbox: workspace-write
          safety-strategy: drop-sudo

      - name: Verify Android compile
        if: steps.fetch_crash.outputs.packet_found == 'true'
        run: |
          chmod +x ./gradlew
          ./gradlew :app:compileDebugKotlin

      - name: Detect code changes
        if: steps.fetch_crash.outputs.packet_found == 'true'
        id: changes
        run: |
          rm -rf .tmp

          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "Codex made no safe changes. No PR will be opened."
          fi

      - name: Create draft pull request
        if: steps.fetch_crash.outputs.packet_found == 'true' && steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: automation/crashlytics-ai-fix-${{ github.run_id }}-${{ github.run_attempt }}
          delete-branch: true
          commit-message: "chore: attempt Crashlytics-guided fix"
          title: "chore: draft Crashlytics-guided fix"
          body: |
            ## Summary
            - attempted a minimal fix based on the latest Crashlytics incident exported to BigQuery
            - verification included `./gradlew :app:compileDebugKotlin`

            ## Safety
            - this PR was created automatically as a draft
            - no auto-merge is configured
            - if the crash packet was missing or Codex could not make a safe fix, no PR would be opened
          draft: true
