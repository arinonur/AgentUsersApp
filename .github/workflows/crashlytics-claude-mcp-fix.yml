name: Crashlytics Claude MCP Fix

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pull-requests: write

jobs:
  crashlytics-claude-mcp-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: crashlytics-claude-mcp-fix
      cancel-in-progress: false
    env:
      FIREBASE_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          create_credentials_file: true

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Firebase CLI credentials
        shell: bash
        run: |
          echo "GOOGLE_APPLICATION_CREDENTIALS=${{ steps.auth.outputs.credentials_file_path }}" >> "$GITHUB_ENV"
          echo "CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE=${{ steps.auth.outputs.credentials_file_path }}" >> "$GITHUB_ENV"
          echo "GOOGLE_CLOUD_PROJECT=${FIREBASE_PROJECT}" >> "$GITHUB_ENV"
          echo "GCLOUD_PROJECT=${FIREBASE_PROJECT}" >> "$GITHUB_ENV"
          cat > .firebaserc <<EOF
          {
            "projects": {
              "default": "${FIREBASE_PROJECT}"
            }
          }
          EOF

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install Firebase CLI
        run: npm install --global firebase-tools@latest

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Create MCP config for Claude Code
        shell: bash
        run: |
          mkdir -p .tmp
          cat > .tmp/mcp-config.json <<EOF
          {
            "mcpServers": {
              "firebase": {
                "command": "firebase",
                "args": ["mcp", "--dir", "${GITHUB_WORKSPACE}", "--only", "crashlytics,core"],
                "env": {
                  "GOOGLE_APPLICATION_CREDENTIALS": "${{ steps.auth.outputs.credentials_file_path }}",
                  "FIREBASE_TOKEN": "${FIREBASE_TOKEN}",
                  "GOOGLE_CLOUD_PROJECT": "${FIREBASE_PROJECT}",
                  "GCLOUD_PROJECT": "${FIREBASE_PROJECT}"
                }
              }
            }
          }
          EOF

      - name: Verify Firebase project access
        shell: bash
        run: |
          ACCESS_TOKEN="$(gcloud auth print-access-token)"
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            "https://firebase.googleapis.com/v1beta1/projects/${FIREBASE_PROJECT}:searchApps?pageSize=1" \
            > .tmp/firebase-apps-check.json
          cat .tmp/firebase-apps-check.json

      - name: Run Claude Code with Firebase MCP
        id: claude
        uses: anthropics/claude-code-base-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt_file: .github/prompts/crashlytics_claude_mcp_fix.md
          mcp_config: .tmp/mcp-config.json
          allowed_tools: "mcp__firebase__*,Read,Edit,Write,Bash(./gradlew:*),Bash(find:*),Bash(ls:*),Bash(cat:*),Bash(git diff:*),Bash(git status:*)"
          max_turns: "25"
          model: "claude-sonnet-4-20250514"

      - name: Prepare pull request metadata
        id: pr_meta
        shell: bash
        run: |
          PR_TITLE="chore: draft Crashlytics Claude-guided fix"
          EXEC_FILE="${{ steps.claude.outputs.execution_file }}"
          if [ -f "$EXEC_FILE" ]; then
            CANDIDATE="$(python3 -c "
          import json, sys
          data = json.load(open(sys.argv[1]))
          msgs = data.get('messages', data if isinstance(data, list) else [])
          for msg in reversed(msgs):
              if isinstance(msg, dict) and msg.get('role') == 'assistant':
                  content = msg.get('content', '')
                  if isinstance(content, str):
                      text = content
                  elif isinstance(content, list):
                      text = next((b['text'] for b in content if isinstance(b, dict) and b.get('type') == 'text'), '')
                  else:
                      continue
                  for line in text.splitlines():
                      if line.strip().startswith('PR title:'):
                          print(line.strip().split('PR title:', 1)[1].strip())
                          sys.exit(0)
          " "$EXEC_FILE" 2>/dev/null || true)"
            if [ -n "$CANDIDATE" ]; then
              PR_TITLE="$CANDIDATE"
            fi
          fi
          echo "title=$PR_TITLE" >> "$GITHUB_OUTPUT"

      - name: Print git status
        run: git status --short

      - name: Print git diff
        run: git diff --stat && git diff

      - name: Clean temporary artifacts before change detection
        shell: bash
        run: |
          rm -rf .tmp/
          rm -f .firebaserc
          rm -f gha-creds-*.json
          rm -rf .claude/
          git checkout -- .codex/config.toml 2>/dev/null || true

      - name: Detect code changes
        id: changes
        shell: bash
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No safe code changes were produced. No PR will be opened."
          fi

      - name: Write google-services.json
        if: steps.changes.outputs.has_changes == 'true'
        shell: bash
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Compile Android project
        if: steps.changes.outputs.has_changes == 'true'
        run: ./gradlew clean :app:compileDebugKotlin --no-build-cache

      - name: Create draft pull request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GH_PAT }}
          branch-token: ${{ secrets.GH_PAT }}
          branch: automation/crashlytics-claude-mcp-fix-${{ github.run_id }}-${{ github.run_attempt }}
          delete-branch: true
          commit-message: "chore: Crashlytics Claude-guided fix"
          title: ${{ steps.pr_meta.outputs.title }}
          body: |
            ## Summary
            - Found the newest actionable Crashlytics issue via Firebase MCP
            - Applied the smallest safe Android/Kotlin fix using Claude Code
            - Verified with `./gradlew clean :app:compileDebugKotlin --no-build-cache`

            ## Safety
            - This PR was created automatically as a **draft**
            - No auto-merge is configured
            - If no safe app-code change was produced, no PR was opened
          draft: true
