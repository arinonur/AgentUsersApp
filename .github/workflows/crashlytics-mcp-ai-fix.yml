name: Crashlytics MCP AI Fix

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pull-requests: write

jobs:
  crashlytics-mcp-ai-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: crashlytics-mcp-ai-fix
      cancel-in-progress: false
    env:
      CODEX_HOME: ${{ github.workspace }}/.codex
      GOOGLE_CLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
      GCLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
      FIREBASE_PROJECT: ${{ secrets.GCP_PROJECT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          create_credentials_file: true

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install Firebase CLI for MCP
        run: npm install --global firebase-tools@latest

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Prepare Codex MCP config
        run: |
          mkdir -p "$HOME/.codex"
          cp .codex/config.toml "$HOME/.codex/config.toml"

      - name: Run Codex with Firebase MCP
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/prompts/crashlytics_mcp_fix.md
          working-directory: .
          sandbox: workspace-write
          safety-strategy: drop-sudo

      - name: Clean CI runtime artifacts
        run: |
          rm -f .codex/*.json
          rm -f .codex/*.sqlite
          rm -rf .codex/logs*
          rm -rf .codex/sessions/
          rm -rf .codex/skills/
          rm -f gha-creds-*.json

      - name: Detect code changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No safe changes were produced. No PR will be opened."
          fi

      - name: Write google-services.json
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          mkdir -p app
          printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Verify Android compile
        if: steps.changes.outputs.has_changes == 'true'
        run: ./gradlew :app:compileDebugKotlin

      - name: Create draft pull request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GH_PAT }}
          add-paths: |
            app/**
            .github/**
            docs/**
            gradle/**
            *.gradle.kts
            settings.gradle.kts
            gradle.properties
          branch: automation/crashlytics-mcp-ai-fix-${{ github.run_id }}-${{ github.run_attempt }}
          delete-branch: true
          commit-message: "chore: attempt Crashlytics MCP-guided fix"
          title: "chore: draft Crashlytics MCP-guided fix"
          body: |
            ## Summary
            - attempted a minimal fix based on the newest actionable Android Crashlytics issue found through Firebase MCP
            - verification included `./gradlew :app:compileDebugKotlin`

            ## Safety
            - this PR was created automatically as a draft
            - no auto-merge is configured
            - if no actionable issue was found or Codex could not produce a safe fix, no PR would be opened
          draft: true
