name: Crashlytics MCP AI Fix

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pull-requests: write

jobs:
  crashlytics-mcp-ai-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: crashlytics-mcp-ai-fix
      cancel-in-progress: false
    env:
      CODEX_HOME: ${{ github.workspace }}/.codex
      GOOGLE_CLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
      GCLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
      FIREBASE_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          create_credentials_file: true

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Firebase CLI credentials
        shell: bash
        run: |
          echo "GOOGLE_APPLICATION_CREDENTIALS=${{ steps.auth.outputs.credentials_file_path }}" >> "$GITHUB_ENV"
          echo "CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE=${{ steps.auth.outputs.credentials_file_path }}" >> "$GITHUB_ENV"
          echo "GOOGLE_CLOUD_PROJECT=${FIREBASE_PROJECT}" >> "$GITHUB_ENV"
          echo "GCLOUD_PROJECT=${FIREBASE_PROJECT}" >> "$GITHUB_ENV"
          cat > .firebaserc <<EOF
          {
            "projects": {
              "default": "${FIREBASE_PROJECT}"
            }
          }
          EOF

      - name: Debug Firebase auth environment
        shell: bash
        run: |
          echo "Project: $FIREBASE_PROJECT"
          test -f "${{ steps.auth.outputs.credentials_file_path }}" && echo "Credentials file exists"
          if [ -n "$FIREBASE_TOKEN" ]; then echo "FIREBASE_TOKEN is set"; else echo "FIREBASE_TOKEN is missing"; fi
          env | grep -E 'GOOGLE_APPLICATION_CREDENTIALS|CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE|GOOGLE_CLOUD_PROJECT|GCLOUD_PROJECT' || true

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install Firebase CLI
        run: npm install --global firebase-tools@latest

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Prepare Codex MCP config
        shell: bash
        run: |
          mkdir -p "$CODEX_HOME"
          mkdir -p "$HOME/.codex"
          cat > "$CODEX_HOME/config.toml" <<EOF
          [mcp_servers.firebase]
          command = "bash"
          args = ["-lc", "firebase --token \"$FIREBASE_TOKEN\" mcp --dir \"${GITHUB_WORKSPACE}\" --only crashlytics,core"]
          EOF
          cat > "$HOME/.codex/config.toml" <<EOF
          [mcp_servers.firebase]
          command = "bash"
          args = ["-lc", "firebase --token \"$FIREBASE_TOKEN\" mcp --dir \"${GITHUB_WORKSPACE}\" --only crashlytics,core"]
          EOF

      - name: Create temporary directory
        run: mkdir -p .tmp

      - name: Verify Firebase project access
        shell: bash
        run: |
          ACCESS_TOKEN="$(gcloud auth print-access-token)"
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            "https://firebase.googleapis.com/v1beta1/projects/${FIREBASE_PROJECT}:searchApps?pageSize=1" \
            > .tmp/firebase-apps-check.json
          cat .tmp/firebase-apps-check.json

      - name: Show Codex config
        shell: bash
        run: |
          echo "CODEX_HOME=$CODEX_HOME"
          ls -la .codex || true
          ls -la "$HOME/.codex" || true
          sed -n '1,200p' "$HOME/.codex/config.toml" || true

      - name: Run Codex with Firebase MCP
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/prompts/crashlytics_mcp_fix.md
          working-directory: .
          codex-home: ${{ github.workspace }}/.codex
          output-file: .tmp/codex-final-message.txt
          sandbox: danger-full-access
          safety-strategy: drop-sudo

      - name: Print Codex output
        shell: bash
        run: |
          if [ -f .tmp/codex-final-message.txt ]; then
            cat .tmp/codex-final-message.txt
          fi
          find .codex -maxdepth 2 -type f | sort || true
          find "$HOME/.codex" -maxdepth 2 -type f | sort || true

      - name: Prepare pull request metadata
        id: pr_meta
        shell: bash
        run: |
          PR_TITLE="chore: draft Crashlytics MCP-guided fix"
          if [ -f .tmp/codex-final-message.txt ]; then
            CANDIDATE="$(sed -n 's/^PR title:[[:space:]]*//p' .tmp/codex-final-message.txt | head -n 1 | tr -d '\r')"
            if [ -n "$CANDIDATE" ]; then
              PR_TITLE="$CANDIDATE"
            fi
          fi
          echo "title=$PR_TITLE" >> "$GITHUB_OUTPUT"

      - name: Print git status
        run: git status --short

      - name: Print git diff
        run: git diff --stat && git diff

      - name: Clean temporary artifacts before change detection
        shell: bash
        run: |
          rm -f .tmp/codex-final-message.txt
          rm -f .tmp/firebase-apps-check.json
          rm -f .codex/*.json
          rm -f .codex/*.sqlite
          rm -rf .codex/logs*
          rm -rf .codex/sessions/
          rm -rf .codex/skills/
          rm -f .firebaserc
          rm -f gha-creds-*.json

      - name: Detect code changes
        id: changes
        shell: bash
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No safe code changes were produced. No PR will be opened."
          fi

      - name: Write google-services.json
        if: steps.changes.outputs.has_changes == 'true'
        shell: bash
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Compile Android project
        if: steps.changes.outputs.has_changes == 'true'
        run: ./gradlew clean :app:compileDebugKotlin --no-build-cache

      - name: Create draft pull request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GH_PAT }}
          branch-token: ${{ secrets.GH_PAT }}
          branch: automation/crashlytics-mcp-ai-fix-${{ github.run_id }}-${{ github.run_attempt }}
          delete-branch: true
          commit-message: "chore: attempt Crashlytics MCP-guided fix"
          title: ${{ steps.pr_meta.outputs.title }}
          body: |
            ## Summary
            - attempted the smallest safe Android/Kotlin fix for the newest actionable Crashlytics issue found via Firebase MCP
            - verification included `./gradlew clean :app:compileDebugKotlin --no-build-cache`

            ## Safety
            - this PR was created automatically as a draft
            - no auto-merge is configured
            - if no safe app-code change was produced, no PR was opened
          draft: true
